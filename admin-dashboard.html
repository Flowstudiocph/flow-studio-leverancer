<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Flow Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1e1d1d; --paper: #f5f2eb; --warm: #faf8f3;
    --gold: #9a8456; --border: rgba(30,29,29,0.1); --muted: rgba(30,29,29,0.42);
    --green: #2a7a5c; --green-bg: rgba(42,122,92,0.08); --green-border: rgba(42,122,92,0.2);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 14px; }

  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2rem;
  }
  .login-logo img { height: 40px; margin: 0 auto; display: block; margin-bottom: 0.5rem; }
  .login-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; text-align: center; color: var(--ink); }
  .login-form { display: flex; flex-direction: column; gap: 10px; width: 260px; }
  .login-form input {
    border: 0.5px solid var(--border); background: var(--warm);
    padding: 11px 14px; border-radius: 4px;
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .login-form input:focus { border-color: rgba(30,29,29,0.4); }
  .login-btn {
    background: var(--ink); color: var(--paper); border: none; padding: 11px;
    border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.15s;
  }
  .login-btn:hover { background: #3a3838; }
  .login-err { font-size: 12px; color: #c85050; text-align: center; display: none; }

  #dashboard { display: none; }

  nav {
    background: var(--warm); border-bottom: 0.5px solid var(--border);
    padding: 0 2.5rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-left { display: flex; align-items: center; gap: 20px; }
  .nav-logo img { height: 26px; }
  .nav-links { display: flex; gap: 0; }
  .nav-link {
    font-size: 12px; color: var(--muted); padding: 0 16px; height: 56px;
    display: flex; align-items: center; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    text-decoration: none;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--ink); border-bottom-color: var(--ink); }
  .nav-refresh {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted); cursor: pointer;
    border: 0.5px solid var(--border); background: none;
    padding: 6px 12px; border-radius: 4px; transition: background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-refresh:hover { background: var(--paper); }
  .nav-refresh svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }

  .page { padding: 2rem 2.5rem; max-width: 1200px; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
  .stat {
    background: var(--warm); border: 0.5px solid var(--border);
    border-radius: 6px; padding: 18px 20px;
  }
  .stat-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--ink); line-height: 1; }
  .stat-val.gold { color: var(--gold); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

  .section { margin-bottom: 2rem; }
  .section-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 10px; border-bottom: 0.5px solid var(--border); margin-bottom: 1rem;
  }
  .section-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .new-proj-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--ink); color: var(--paper); border: none;
    padding: 8px 16px; border-radius: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s;
  }
  .new-proj-btn:hover { background: #3a3838; }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); font-weight: 400; padding: 0 10px 10px;
    border-bottom: 0.5px solid var(--border);
  }
  td {
    padding: 11px 10px; font-size: 13px;
    border-bottom: 0.5px solid rgba(30,29,29,0.05);
    vertical-align: middle;
  }
  tr:hover td { background: rgba(30,29,29,0.015); }
  .td-mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .td-bold { font-weight: 500; }
  .td-gold { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 16px; }
  .td-muted { color: var(--muted); }

  .proj-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .proj-card {
    background: var(--warm); border: 0.5px solid var(--border);
    border-radius: 6px; padding: 16px 18px;
  }
  .proj-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .proj-card-name { font-weight: 500; font-size: 14px; }
  .proj-card-client { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .proj-total { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--gold); }
  .proj-total-label { font-size: 10px; color: var(--muted); text-align: right; }
  .proj-dl-list { border-top: 0.5px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 5px; }
  .proj-dl-row { display: flex; justify-content: space-between; font-size: 12px; }
  .proj-dl-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

  .invoice-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
  }
  .chip-pending { background: rgba(154,132,86,0.1); border: 0.5px solid rgba(154,132,86,0.3); color: var(--gold); }
  .chip-sent { background: var(--green-bg); border: 0.5px solid var(--green-border); color: var(--green); }

  .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div id="loginScreen">
  <div>
    <div class="login-logo"><img src="logo.svg" alt="Flow Studio"></div>
    <div class="login-title" style="margin-top:12px;">Admin Dashboard</div>
  </div>
  <div class="login-form">
    <input type="text" id="scriptUrlInput" placeholder="Apps Script URL">
    <input type="password" id="adminKeyInput" placeholder="Admin-nøgle">
    <button class="login-btn" onclick="login()">Log ind</button>
    <div class="login-err" id="loginErr">Forkert nøgle eller URL</div>
  </div>
</div>

<div id="dashboard">
  <nav>
    <div class="nav-left">
      <div class="nav-logo"><img src="logo.svg" alt="Flow Studio"></div>
      <div class="nav-links">
        <a class="nav-link active" href="admin-dashboard.html">Oversigt</a>
        <a class="nav-link" href="admin-opret.html">Opret projekt</a>
      </div>
    </div>
    <button class="nav-refresh" onclick="loadData()">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Opdater
    </button>
  </nav>

  <div class="page">

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Downloads i alt</div>
        <div class="stat-val" id="sTotal">—</div>
        <div class="stat-sub">ekstra billeder hentet</div>
      </div>
      <div class="stat">
        <div class="stat-label">At fakturere</div>
        <div class="stat-val gold" id="sRevenue">—</div>
        <div class="stat-sub">samlet beløb</div>
      </div>
      <div class="stat">
        <div class="stat-label">Projekter</div>
        <div class="stat-val" id="sProjects">—</div>
        <div class="stat-sub">med downloads</div>
      </div>
      <div class="stat">
        <div class="stat-label">Seneste</div>
        <div class="stat-val" id="sLatest" style="font-size:18px;padding-top:4px;">—</div>
        <div class="stat-sub" id="sLatestSub">—</div>
      </div>
    </div>

    <div class="section">
      <div class="section-bar">
        <div class="section-title">Seneste downloads</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Tidspunkt</th>
            <th>Kunde</th>
            <th>Projekt</th>
            <th>Billede</th>
            <th style="text-align:right;">Beløb</th>
          </tr>
        </thead>
        <tbody id="dlTable"><tr><td colspan="5" class="empty">Indlæser…</td></tr></tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-bar">
        <div class="section-title">Projekter med downloads</div>
        <a class="new-proj-btn" href="admin-opret.html">+ Nyt projekt</a>
      </div>
      <div class="proj-cards" id="projCards"><div class="empty">Indlæser…</div></div>
    </div>

  </div>
</div>

<script>
let scriptUrl = '', adminKey = '';

document.getElementById('adminKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  scriptUrl = document.getElementById('scriptUrlInput').value.trim();
  adminKey = document.getElementById('adminKeyInput').value.trim();
  await loadData();
}

async function loadData() {
  try {
    const res = await fetch(`${scriptUrl}?action=getDashboard&adminKey=${encodeURIComponent(adminKey)}`);
    const data = await res.json();
    if (!data.ok) { document.getElementById('loginErr').style.display = 'block'; return; }
    showDashboard(data);
  } catch (e) {
    showDashboard(demoData());
  }
}

function showDashboard(data) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  document.getElementById('sTotal').textContent = data.totalDownloads;
  document.getElementById('sRevenue').textContent = 'DKK ' + Number(data.totalRevenue).toLocaleString('da-DK');
  document.getElementById('sProjects').textContent = data.projects.length;

  if (data.recentDownloads.length) {
    const l = data.recentDownloads[0];
    document.getElementById('sLatest').textContent = fmtTime(new Date(l.timestamp));
    document.getElementById('sLatestSub').textContent = l.clientName;
  }

  const tbody = document.getElementById('dlTable');
  tbody.innerHTML = !data.recentDownloads.length
    ? '<tr><td colspan="5" class="empty">Ingen downloads endnu</td></tr>'
    : data.recentDownloads.map(r => `
      <tr>
        <td class="td-mono">${fmtDate(new Date(r.timestamp))}</td>
        <td class="td-bold">${r.clientName}</td>
        <td class="td-muted">${r.projectName}</td>
        <td>${r.fileName}</td>
        <td style="text-align:right;" class="td-gold">DKK ${Number(r.price).toLocaleString('da-DK')}</td>
      </tr>
    `).join('');

  const cards = document.getElementById('projCards');
  cards.innerHTML = !data.projects.length
    ? '<div class="empty">Ingen projekter med downloads endnu</div>'
    : data.projects.map(p => `
      <div class="proj-card">
        <div class="proj-card-top">
          <div>
            <div class="proj-card-name">${p.projectName}</div>
            <div class="proj-card-client">${p.clientName}</div>
          </div>
          <div>
            <div class="proj-total">DKK ${Number(p.total).toLocaleString('da-DK')}</div>
            <div class="proj-total-label">at fakturere</div>
          </div>
        </div>
        <div class="proj-dl-list">
          ${p.downloads.map(d => `
            <div class="proj-dl-row">
              <span>${d.fileName}</span>
              <span class="proj-dl-time">${fmtDate(new Date(d.timestamp))}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
}

function fmtDate(d) {
  const diffH = (Date.now() - d) / 3600000;
  if (diffH < 1) return 'For lidt siden';
  if (diffH < 24) return `${Math.floor(diffH)}t siden`;
  return d.toLocaleDateString('da-DK', {day:'numeric', month:'short'});
}
function fmtTime(d) { return d.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'}); }

function demoData() {
  return {
    totalDownloads: 7, totalRevenue: 5950,
    recentDownloads: [
      { timestamp: new Date(Date.now()-2*3600000), clientName:'Hansen Ejendomme A/S', projectName:'Harbour View Penthouse', fileName:'Køkkenø detalje', price:850 },
      { timestamp: new Date(Date.now()-2*3600000), clientName:'Hansen Ejendomme A/S', projectName:'Harbour View Penthouse', fileName:'Terrasse · Aften', price:850 },
      { timestamp: new Date(Date.now()-26*3600000), clientName:'Nordic Development', projectName:'Østerbro Residences', fileName:'Facade · Close-up', price:850 },
    ],
    projects: [
      { projectId:'PRJ-A', clientName:'Hansen Ejendomme A/S', projectName:'Harbour View Penthouse', total:1700,
        downloads:[{fileName:'Køkkenø detalje',timestamp:new Date(Date.now()-2*3600000)},{fileName:'Terrasse · Aften',timestamp:new Date(Date.now()-2*3600000)}] },
      { projectId:'PRJ-B', clientName:'Nordic Development', projectName:'Østerbro Residences', total:2550,
        downloads:[{fileName:'Facade · Close-up',timestamp:new Date(Date.now()-26*3600000)},{fileName:'Lobby · Detail',timestamp:new Date(Date.now()-26*3600000)},{fileName:'Garden · Dusk',timestamp:new Date(Date.now()-26*3600000)}] },
    ]
  };
}
</script>
</body>
</html>
